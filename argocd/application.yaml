apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: p9-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/AliYasser2003/P9_Gitops-Platform-Deploy.git
    targetRevision: HEAD
    path: helm/p9-app
    helm:
      valueFiles:
        - ../../environments/dev/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
